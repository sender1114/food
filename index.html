<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="კვება">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>კვება</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0e0e12;color:#fff;min-height:100vh}
.app{max-width:440px;margin:0 auto;padding:0 0 80px}
.hero{padding:52px 20px 24px;position:relative;overflow:hidden}
.hero-blob1{position:absolute;top:-60px;right:-40px;width:220px;height:220px;background:#1D9E75;border-radius:50%;opacity:0.07}
.hero-blob2{position:absolute;bottom:-80px;left:-30px;width:180px;height:180px;background:#378ADD;border-radius:50%;opacity:0.06}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;position:relative;z-index:1}
.topbar-title{font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.topbar-date{font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.07);padding:5px 12px;border-radius:99px}
.cal-hero{position:relative;z-index:1}
.cal-hero-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.cal-label{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.cal-big{font-size:44px;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1}
.cal-unit{font-size:15px;color:rgba(255,255,255,0.35);font-weight:400;letter-spacing:0}
.cal-remain-block{text-align:right}
.cal-remain-num{font-size:22px;font-weight:600;color:#1D9E75}
.prog-track{width:100%;height:4px;background:rgba(255,255,255,0.07);border-radius:99px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:#1D9E75;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.macros-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.macro-cell{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:14px 12px}
.macro-dot{width:6px;height:6px;border-radius:50%;margin-bottom:8px}
.macro-name{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.macro-val{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.5px}
.macro-target{font-size:11px;color:rgba(255,255,255,0.2);margin-top:2px}
.macro-bar{width:100%;height:2px;background:rgba(255,255,255,0.07);border-radius:99px;margin-top:10px;overflow:hidden}
.content{padding:0 16px}
.section-hd{font-size:11px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:0.09em;text-transform:uppercase;margin:24px 0 10px}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;opacity:0.25;pointer-events:none}
.search-input{width:100%;padding:13px 14px 13px 42px;font-size:15px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#fff;outline:none;-webkit-appearance:none}
.search-input::placeholder{color:rgba(255,255,255,0.2)}
.search-input:focus{border-color:rgba(29,158,117,0.4);background:rgba(255,255,255,0.08)}
.food-list{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px}
.food-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.03);cursor:pointer;transition:background 0.12s}
.food-row:last-child{border-bottom:none}
.food-row:active{background:rgba(255,255,255,0.07)}
.food-name{font-size:14px;font-weight:500;color:#fff}
.food-detail{font-size:12px;color:rgba(255,255,255,0.3);margin-top:3px}
.food-add{width:32px;height:32px;border-radius:50%;background:rgba(29,158,117,0.15);border:1px solid rgba(29,158,117,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#1D9E75;font-size:22px;line-height:1;font-weight:300}
.log-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.03)}
.log-row:last-child{border-bottom:none}
.log-right{display:flex;align-items:center;gap:10px}
.log-cal{font-size:13px;font-weight:600;color:#1D9E75}
.log-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;cursor:pointer;color:#fff;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:13px;font-weight:600;color:#fff;min-width:16px;text-align:center}
.log-del{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.15);font-size:20px;line-height:1;padding:0 2px}
.log-del:active{color:#E24B4A}
.empty-log{padding:28px;text-align:center;font-size:13px;color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.02)}
.loading{padding:20px;text-align:center;font-size:13px;color:rgba(255,255,255,0.3)}
.reset-btn{width:100%;margin-top:24px;padding:14px;font-size:14px;border:1px solid rgba(255,255,255,0.07);border-radius:14px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.25);cursor:pointer;-webkit-appearance:none}
.reset-btn:active{background:rgba(255,255,255,0.08)}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;font-size:14px;font-weight:500;padding:11px 22px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity 0.25s;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
.quick-title{font-size:12px;color:rgba(255,255,255,0.25);margin-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-blob1"></div>
    <div class="hero-blob2"></div>
    <div class="topbar">
      <div class="topbar-title">კვება</div>
      <div class="topbar-date" id="date-label"></div>
    </div>
    <div class="cal-hero">
      <div class="cal-hero-top">
        <div>
          <div class="cal-label">მიღებული</div>
          <div class="cal-big"><span id="cal-consumed">0</span> <span class="cal-unit">კკალ</span></div>
        </div>
        <div class="cal-remain-block">
          <div class="cal-label">დარჩენილი</div>
          <div class="cal-remain-num" id="cal-remain">3,300 კკალ</div>
        </div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="cal-bar" style="width:0%"></div></div>
      <div class="macros-row">
        <div class="macro-cell">
          <div class="macro-dot" style="background:#378ADD"></div>
          <div class="macro-name">ცილა</div>
          <div class="macro-val" id="p-cur">0გ</div>
          <div class="macro-target">სულ 155გ</div>
          <div class="macro-bar"><div id="p-bar" style="width:0%;height:100%;border-radius:99px;background:#378ADD;transition:width 0.4s"></div></div>
        </div>
        <div class="macro-cell">
          <div class="macro-dot" style="background:#EF9F27"></div>
          <div class="macro-name">ნახშირწყ.</div>
          <div class="macro-val" id="c-cur">0გ</div>
          <div class="macro-target">სულ 400გ</div>
          <div class="macro-bar"><div id="c-bar" style="width:0%;height:100%;border-radius:99px;background:#EF9F27;transition:width 0.4s"></div></div>
        </div>
        <div class="macro-cell">
          <div class="macro-dot" style="background:#D4537E"></div>
          <div class="macro-name">ცხიმი</div>
          <div class="macro-val" id="f-cur">0გ</div>
          <div class="macro-target">სულ 90გ</div>
          <div class="macro-bar"><div id="f-bar" style="width:0%;height:100%;border-radius:99px;background:#D4537E;transition:width 0.4s"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="section-hd">საკვების ძებნა</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
      <input class="search-input" id="search" placeholder="მოძებნე ნებისმიერი საკვები..." oninput="onSearch(this.value)"/>
    </div>
    <div class="food-list" id="food-list">
      <div class="empty-log">დაიწყე აკრეფა საკვების საპოვნელად</div>
    </div>

    <div class="section-hd">სწრაფი დამატება</div>
    <div class="food-list" id="quick-list"></div>

    <div class="section-hd">დღევანდელი ჟურნალი</div>
    <div class="food-list" id="log-list"><div class="empty-log">საკვები ჯერ არ არის დამატებული</div></div>

    <button class="reset-btn" onclick="resetDay()">დღის გადატვირთვა</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TARGETS={cal:3300,p:155,c:400,f:90};
const QUICK=[
  {name:'მთლიანი კვერცხი',detail:'1 კვერცხი (50გ)',cal:70,p:6,c:0,f:5},
  {name:'წიწილის მკერდი',detail:'200გ მომხარშული',cal:220,p:46,c:0,f:5},
  {name:'შვრია',detail:'80გ გაუმხარშავი',cal:300,p:10,c:52,f:5},
  {name:'ბანანი',detail:'1 საშუალო',cal:105,p:1,c:27,f:0},
  {name:'ბერძნული იოგურტი',detail:'200გ',cal:130,p:20,c:8,f:2},
  {name:'ხაჭო',detail:'200გ',cal:180,p:24,c:6,f:5},
  {name:'თეთრი ბრინჯი',detail:'100გ გაუმხარშავი',cal:350,p:7,c:78,f:1},
  {name:'ხინკალი',detail:'1 ცალი (70გ)',cal:145,p:8,c:18,f:5},
  {name:'სულგუნი',detail:'50გ',cal:160,p:12,c:0,f:13},
  {name:'მწვადი',detail:'150გ',cal:260,p:32,c:0,f:14},
  {name:'შრატის ცილა',detail:'1 პორცია (30გ)',cal:120,p:24,c:3,f:2},
  {name:'ნიგოზი',detail:'30გ',cal:196,p:5,c:4,f:19},
];

let log=JSON.parse(localStorage.getItem('mlog_'+today())||'[]');
let searchTimer=null;

function today(){return new Date().toISOString().split('T')[0]}
function fmt(n){return Math.round(n).toLocaleString()}
function pct(v,t){return Math.min(100,Math.round(v/t*100))}

function update(){
  const tot={cal:0,p:0,c:0,f:0};
  log.forEach(i=>{tot.cal+=i.cal*i.qty;tot.p+=i.p*i.qty;tot.c+=i.c*i.qty;tot.f+=i.f*i.qty});
  document.getElementById('cal-consumed').textContent=fmt(tot.cal);
  document.getElementById('cal-remain').textContent=fmt(Math.max(0,TARGETS.cal-tot.cal))+' კკალ';
  document.getElementById('cal-bar').style.width=pct(tot.cal,TARGETS.cal)+'%';
  document.getElementById('p-cur').textContent=Math.round(tot.p)+'გ';
  document.getElementById('c-cur').textContent=Math.round(tot.c)+'გ';
  document.getElementById('f-cur').textContent=Math.round(tot.f)+'გ';
  document.getElementById('p-bar').style.width=pct(tot.p,TARGETS.p)+'%';
  document.getElementById('c-bar').style.width=pct(tot.c,TARGETS.c)+'%';
  document.getElementById('f-bar').style.width=pct(tot.f,TARGETS.f)+'%';
  renderLog();
  localStorage.setItem('mlog_'+today(),JSON.stringify(log));
}

function addFood(food){
  const existing=log.findIndex(i=>i.name===food.name);
  if(existing>=0){
    log[existing].qty+=1;
  } else {
    log.push({...food,qty:1});
  }
  update();
  showToast(food.name+' დამატებულია');
}

function changeQty(idx,delta){
  log[idx].qty+=delta;
  if(log[idx].qty<=0) log.splice(idx,1);
  update();
}

function renderLog(){
  const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<div class="empty-log">საკვები ჯერ არ არის დამატებული</div>';return}
  el.innerHTML=log.map((f,i)=>`
    <div class="log-row">
      <div style="flex:1;min-width:0">
        <div class="food-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div>
        <div class="food-detail">${f.detail} &middot; ც${f.p}გ ნ${f.c}გ ცხ${f.f}გ</div>
      </div>
      <div class="log-right">
        <div class="log-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-num">x${f.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div class="log-cal">${Math.round(f.cal*f.qty)}კკალ</div>
        <button class="log-del" onclick="changeQty(${i},-999)">×</button>
      </div>
    </div>`).join('');
}

function renderQuick(){
  const el=document.getElementById('quick-list');
  el.innerHTML=QUICK.map((f,i)=>`
    <div class="food-row" onclick="addFood(QUICK[${i}])">
      <div>
        <div class="food-name">${f.name}</div>
        <div class="food-detail">${f.detail} &middot; ${f.cal}კკალ &middot; ც${f.p} ნ${f.c} ცხ${f.f}</div>
      </div>
      <button class="food-add" onclick="event.stopPropagation();addFood(QUICK[${i}])">+</button>
    </div>`).join('');
}

function onSearch(q){
  clearTimeout(searchTimer);
  const el=document.getElementById('food-list');
  if(!q||q.length<2){
    el.innerHTML='<div class="empty-log">დაიწყე აკრეფა საკვების საპოვნელად</div>';
    return;
  }
  el.innerHTML='<div class="loading">ძებნა...</div>';
  searchTimer=setTimeout(()=>searchFood(q),600);
}

async function searchFood(q){
  const el=document.getElementById('food-list');
  try {
    const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=10&fields=product_name,nutriments,serving_size`);
    const data=await res.json();
    const products=(data.products||[]).filter(p=>{
      const n=p.nutriments||{};
      return p.product_name && n['energy-kcal_100g']>0;
    }).slice(0,8);

    if(!products.length){
      el.innerHTML='<div class="empty-log">საკვები ვერ მოიძებნა — სცადე სხვა სახელი</div>';
      return;
    }

    el.innerHTML=products.map((p,i)=>{
      const n=p.nutriments||{};
      const cal=Math.round(n['energy-kcal_100g']||0);
      const prot=Math.round(n['proteins_100g']||0);
      const carb=Math.round(n['carbohydrates_100g']||0);
      const fat=Math.round(n['fat_100g']||0);
      const name=p.product_name||'უცნობი';
      const food={name:name.slice(0,40),detail:'100გ',cal,p:prot,c:carb,f:fat};
      return `<div class="food-row" onclick='addFoodObj(${JSON.stringify(food)})'>
        <div>
          <div class="food-name">${name.slice(0,35)}</div>
          <div class="food-detail">100გ &middot; ${cal}კკალ &middot; ც${prot}გ ნ${carb}გ ცხ${fat}გ</div>
        </div>
        <button class="food-add" onclick='event.stopPropagation();addFoodObj(${JSON.stringify(food)})'>+</button>
      </div>`;
    }).join('');
  } catch(e){
    el.innerHTML='<div class="empty-log">კავშირის შეცდომა — სცადე თავიდან</div>';
  }
}

function addFoodObj(food){
  addFood(food);
}

function resetDay(){
  if(confirm('გადატვირთავ დღევანდელ ჟურნალს?')){log=[];update();}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

const d=new Date();
const days=['კვირა','ორშაბათი','სამშაბათი','ოთხშაბათი','ხუთშაბათი','პარასკევი','შაბათი'];
const months=['იანვ','თებ','მარ','აპრ','მაი','ივნ','ივლ','აგვ','სექ','ოქტ','ნოე','დეკ'];
document.getElementById('date-label').textContent=days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()];
renderQuick();
update();
</script>
</body>
</html>
